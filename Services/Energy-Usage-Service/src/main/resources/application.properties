spring.application.name={APP_NAME:Energy-Usage-Service}

# Server configuration
server.port=${SERVER_PORT:9108}

#Kafka - Consumer configuration
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=energy-usage-consumer-group
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.Home_Energy_Tracker.Kafka.event.EnergyUsageEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.Home_Energy_Tracker.Kafka.event,com.Home_Energy_Tracker.kafka.event


#Kafka - producer
spring.kafka.template.default-topic=energy-alerts
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer



# Actuator & Prometheus (scraped by Prometheus in docker-compose)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

#Influx DB Configuration
influx.url=http://localhost:8072
influx.token=my-token
influx.org=Home_Energy_Tracker
influx.bucket=energy-usage-bucket


device.service.url= http://localhost:9106/api/v1/devices
user.service.url= http://localhost:9105/api/v1/users