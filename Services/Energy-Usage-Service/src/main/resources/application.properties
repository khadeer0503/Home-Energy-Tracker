spring.application.name={APP_NAME:Energy-Usage-Service}

# Server configuration
server.port=${SERVER_PORT:9108}

#Kafka - Consumer configuration
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=energy-usage-consumer-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:com.Home_Energy_Tracker.Kafka.event.EnergyUsageEvent

# Actuator & Prometheus (scraped by Prometheus in docker-compose)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

#Influx DB Configuration
influx.url=http://localhost:8072
influx.token=my-token
influx.org=Home_Energy_Tracker
influx.bucket=energy-usage-bucket


