spring.application.name=${APP_NAME:IOT-Ingestion-Service}

# Server configuration
server.port=${SERVER_PORT:9107}

#Kafka - Producer configuration
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.template.default-topic=energy-usage
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# Continuous simulation configuration
simulation.endpoint=http://localhost:9107/api/v1/ingestion/energy-usage
simulation.interval-ms=5000
simulation.requests-per-interval=100
simulation.parallel-threads=10

# Actuator & Prometheus (scraped by Prometheus in docker-compose)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
